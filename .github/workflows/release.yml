name: Release Android APKs

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build & Release Gastos Casa APKs
    runs-on: ubuntu-latest

    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Reconstruir archivos sensibles desde Base64
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES_BASE64: ${{ secrets.KEY_PROPERTIES_BASE64 }}
          FIREBASE_JSON_BASE64: ${{ secrets.FIREBASE_JSON_BASE64 }}
        run: |

          printf "%s" "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf "%s" "$KEY_PROPERTIES_BASE64" | base64 --decode > android/key.properties
          printf "%s" "$FIREBASE_JSON_BASE64" | base64 --decode > android/app/google-services.json

      - name: Verificar archivos reconstruidos
        run: |
          ls -lah android
          ls -lah android/app

      - name: Instalar dependencias de Flutter
        run: flutter pub get

      - name: Compilar APKs divididos por arquitectura
        run: flutter build apk --split-per-abi --release

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}